name: EAS Update

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "EAS channel/branch name"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
      message:
        description: "Update message (optional)"
        required: false
        default: ""
        type: string

jobs:
  publish-update:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS update
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          CHANNEL="${{ inputs.channel }}"
          MESSAGE="${{ inputs.message }}"

          if [ -z "$MESSAGE" ]; then
            MESSAGE="GitHub Actions update #${{ github.run_number }}"
          fi

          npm run eas:update -- "$CHANNEL" "$MESSAGE"
